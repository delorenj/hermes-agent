# Hermes agent role manifest.  Tracked in the PROJECT repository.
# The agent's actual state (memory, sessions, evolving SOUL) lives in the
# runtime submodule.  This file is the immutable contract for this role.

repo: hermes-agent
role: pm
agent_id: hermes-agent-pm
display_name: "Hermes-Agent PM"
purpose: "Project manage the hermes-agent fork: triage upstream changes, route fleet improvements, maintain BMAD docs"

# Inference target (empty = inherit from global ~/.hermes/config.yaml)
model:
  provider: ""
  name: ""

# Hermes profile name. Profile dir is symlinked into ./runtime/.
profile: hermes-agent-pm

# Telegram bot identity (one bot per agent — see docs/architecture.md).
telegram:
  bot_username: "hermes_agent_pm_bot"

# Email address (Cloudflare Email Routing on delo.sh).
email:
  address: "hermes-agent-pm@delo.sh"
  forward_to: "jaradd@gmail.com"

# Plane project (1:1 with this agent).
plane:
  workspace: "33god"
  # identifier is set by .scripts/40-plane.sh after creation
  identifier: "HERPM"
# Bloodbank wiring (consumed + produced subjects).
bloodbank:
  subscribe:
    - "bloodbank.evt.v1.repo.hermes-agent.>"
    - "bloodbank.cmd.v1.agent.hermes-agent-pm.>"
  producer: "hermes-agent:hermes-agent-pm"

# Runtime repo (git-tracked HERMES_HOME, auto-checkpointed).
runtime:
  github_repo: "delorenj/agent-hm-hermes-agent-pm"
  submodule_path: "./runtime"
  checkpoint:
    cadence: "hourly"
    on_session_end: true

# Provenance — managed by the template, do not hand-edit.
provisioned_at: "2026-05-16T04:27:43Z"
provisioned_by: hermes-agent-template
